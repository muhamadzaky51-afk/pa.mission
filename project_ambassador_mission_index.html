        const playVictorySound = () => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioCtx = new AudioContext();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); 
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); 
                oscillator.frequency.exponentialRampToValueAtTime(1108.73, audioCtx.currentTime + 0.3); 
                
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 1.5);
            } catch(e) { console.log("Audio API not supported."); }
        };

        const calculateStatus = (mission, currentTime) => {
            if (mission.statusOverride) return mission.statusOverride; 
            
            const now = currentTime.getTime();
            const open = new Date(mission.openDate).getTime();
            const close = new Date(mission.closeDate).getTime();

            if (now < open) return 'Coming Soon';
            if (now >= open && now <= close) return 'Available';
            if (now > close) return 'Mission Closed';
            return 'Locked';
        };

                'Completed': { color: 'text-emerald-400', bg: 'bg-emerald-400/10', border: 'border-emerald-500/50', icon: Icons.CheckCircle },
                'Mission Closed': { color: 'text-red-400', bg: 'bg-red-400/10', border: 'border-red-900/50', icon: Icons.Lock },
                'Locked': { color: 'text-slate-500', bg: 'bg-slate-800/50', border: 'border-slate-800', icon: Icons.Lock },
            };
            return configs[status] || configs['Locked'];
        };

        const useCountdown = (targetDateStr, currentTime) => {
            const target = new Date(targetDateStr).getTime();
            const now = currentTime.getTime();
            const diff = target - now;

            if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, isPast: true };

            return {
                days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                hours: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                minutes: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
                seconds: Math.floor((diff % (1000 * 60)) / 1000),
                isPast: false
            };
        };

                                                    <option value="Submitted">Submitted</option>
                                                    <option value="Waiting for Review">Waiting for Review</option>
                                                    <option value="Revision Required">Revision Required</option>
                                                    <option value="Approved">Approved (Selesai)</option>
                                                </select>
                                            </td>
                                            <td className="py-3">
                                                {mission.type === 'special' ? (
                                                    <button 
                                                        onClick={() => toggleAssignment(mission.id)}
                                                        className={`px-2.5 py-1.5 rounded-lg text-[10px] md:text-xs font-semibold border transition-all flex items-center gap-1 ${mission.isAssigned ? 'bg-purple-500/25 text-purple-300 border-purple-500/30' : 'bg-surface text-slate-500 border-white/10'}`}
                                                    >
                                                        <Icons.Users size={10} />
                                                        {mission.isAssigned ? 'Terpilih (Selected)' : 'Tidak Terpilih'}
                                                    </button>
                                                ) : (
                                                    <span className="text-[10px] md:text-xs text-slate-500">Semua Peserta</span>
                                                )}
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </Card>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard'); 
            const [selectedMissionId, setSelectedMissionId] = useState(null);
            const [missions, setMissions] = useState(initialMissions);
            
            // Set User XP to start from exactly 0 XP
            const [userXp, setUserXp] = useState(0);
            
            // Cinematic Complete Screen State
            const [completedMissionInfo, setCompletedMissionInfo] = useState(null); 

            // Time Simulation State (Now completely bound to system Date.now() on load)
            const [timeOffset, setTimeOffset] = useState(0);
            const [realTime, setRealTime] = useState(Date.now());

            useEffect(() => {
                const timer = setInterval(() => {
                    setRealTime(Date.now()); // Tracks actual local time precisely
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const currentTime = useMemo(() => new Date(realTime + timeOffset), [realTime, timeOffset]);

            const advanceTime = (ms) => setTimeOffset(prev => prev + ms);
            const resetTime = () => setTimeOffset(0);

            // Handle Submissions
            const handleSubmitMission = (id, data) => {
                setMissions(prev => prev.map(m => m.id === id ? { ...m, statusOverride: 'Waiting for Review' } : m));
            };

            // Monitor for 'Approved' status to trigger cinematic sequence
            const animatedMissionsRef = useRef(new Set());
            useEffect(() => {
                const newlyApproved = missions.find(m => m.statusOverride === 'Approved' && !animatedMissionsRef.current.has(m.id));
                if (newlyApproved) {
                    animatedMissionsRef.current.add(newlyApproved.id);
                    setCompletedMissionInfo(newlyApproved);
                    setUserXp(prev => prev + newlyApproved.xp);
                }
            }, [missions]);

            const selectedMission = missions.find(m => m.id === selectedMissionId);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Top Navigation */}
                    <nav className="sticky top-0 z-40 bg-background/80 backdrop-blur-xl border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-1.5 text-white font-display font-bold text-base md:text-xl cursor-pointer truncate" onClick={() => setView('dashboard')}>
                                <div className="w-7.5 h-7.5 rounded-lg bg-gradient-to-br from-primary to-purple-600 flex items-center justify-center shadow-lg shadow-primary/20 shrink-0">
                                    <Icons.Star size={14} className="text-white" />
                                </div>
                                <span className="truncate ml-1">Ambassador Hub</span>
                            </div>
                            <div className="flex items-center gap-1.5 md:gap-3 shrink-0">
                                <button onClick={() => setView('dashboard')} className={`p-2 rounded-lg transition-colors ${view === 'dashboard' ? 'bg-white/10 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                                    <Icons.Home size={18} />
                                </button>
                                <button onClick={() => setView('admin')} className={`p-2 rounded-lg transition-colors ${view === 'admin' ? 'bg-white/10 text-white' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                                    <Icons.Settings size={18} />
                                </button>
                                <div className="h-6 w-px bg-white/10 mx-0.5 md:mx-1"></div>
                                <div className="flex items-center gap-1 md:gap-1.5 bg-white/5 rounded-full px-2.5 py-1 border border-white/15">
                                    <div className="w-4 h-4 md:w-5 md:h-5 rounded-full bg-gradient-to-r from-amber-400 to-orange-500 flex items-center justify-center shrink-0">
                                        <Icons.Star size={8} className="text-white" />
                                    </div>
                                    <span className="text-[10px] md:text-xs font-bold text-white whitespace-nowrap">{userXp} XP</span>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-1 px-4 md:px-6 pt-6 md:pt-10">
                        <AnimatePresence mode="wait">
                            {view === 'dashboard' && (
                                <motion.div key="dashboard" initial={{ opacity: 0, x: -15 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 15 }}>
                                    <Dashboard 
                                        missions={missions} 
                                        currentTime={currentTime} 
                                        userXp={userXp}
                                        onOpenMission={(mission) => {
                                            setSelectedMissionId(mission.id);
                                            setView('mission');
                                        }} 
                                    />
                                </motion.div>
                            )}
                            
                            {view === 'mission' && selectedMission && (
                                <motion.div key="mission" initial={{ opacity: 0, x: 15 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -15 }}>
                                    <MissionPage 
                                        mission={selectedMission} 
                                        currentTime={currentTime}
                                        onBack={() => setView('dashboard')}
                                        onSubmitMission={handleSubmitMission}
                                    />
                                </motion.div>
                            )}

                            {view === 'admin' && (
                                <motion.div key="admin" initial={{ opacity: 0, scale: 0.97 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 0.97 }}>
                                    <AdminPanel 
                                        missions={missions} 
                                        setMissions={setMissions} 
                                        currentTime={currentTime}
                                        advanceTime={advanceTime}
                                        resetTime={resetTime}
                                    />
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* Cinematic Overlay */}
                    <AnimatePresence>
                        {completedMissionInfo && (
                            <MissionCompleteScreen 
                                mission={completedMissionInfo}
                                xpEarned={completedMissionInfo.xp}
                                onContinue={() => {
                                    setCompletedMissionInfo(null);
                                    if(view === 'mission') setView('dashboard');
                                }}
                            />
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
